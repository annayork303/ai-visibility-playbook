<!-- FAQPage schema — add inside <head> on pages with a Q&A / FAQ section.
     Repeat the Question object for each FAQ entry.
     Validate at https://search.google.com/test/rich-results after adding.
     From The AI Visibility Playbook by Anna York / Citation School (CC BY 4.0) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Your question here?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Your direct answer here..."
      }
    }
  ]
}
</script>
